<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASTEROIDS // NEON VOID</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Orbitron', sans-serif;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #hud {
      position: fixed;
      top: 20px; left: 20px; right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 20;
    }

    #score-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      color: #0ff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      letter-spacing: 3px;
    }

    #combo-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: #f0f;
      text-shadow: 0 0 10px #f0f;
      opacity: 0;
      transition: opacity 0.2s;
      margin-top: 5px;
    }

    #combo-display.active { opacity: 1; }

    #wave-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      color: #0f0;
      text-shadow: 0 0 10px #0f0;
      text-align: right;
    }

    #lives-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: #f55;
      text-shadow: 0 0 10px #f55;
      text-align: right;
      margin-top: 5px;
    }

    #powerup-bar {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: none;
      z-index: 20;
    }

    .powerup-slot {
      width: 44px; height: 44px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
      background: rgba(0,0,0,0.4);
    }

    .powerup-slot .timer-ring {
      position: absolute;
      top: -3px; left: -3px;
      width: 50px; height: 50px;
    }

    #start-screen, #game-over-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: all;
      background: radial-gradient(ellipse at center, rgba(10,10,30,0.95) 0%, rgba(5,5,15,0.98) 100%);
    }

    #game-over-screen { display: none; }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(135deg, #0ff, #f0f, #ff0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 10px;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: #888;
      letter-spacing: 8px;
      margin-bottom: 50px;
    }

    .start-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      padding: 15px 50px;
      border: 2px solid #0ff;
      background: transparent;
      color: #0ff;
      cursor: pointer;
      letter-spacing: 4px;
      transition: all 0.3s;
      pointer-events: all;
    }

    .start-btn:hover {
      background: #0ff;
      color: #0a0a0f;
      box-shadow: 0 0 30px #0ff;
    }

    .controls-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #555;
      margin-top: 30px;
      text-align: center;
      line-height: 2;
    }

    .controls-hint span {
      color: #0ff;
      border: 1px solid #333;
      padding: 2px 8px;
      border-radius: 3px;
      margin: 0 3px;
    }

    .final-score {
      font-family: 'Share Tech Mono', monospace;
      font-size: 48px;
      color: #0ff;
      text-shadow: 0 0 20px #0ff;
      margin: 20px 0;
    }

    .stats {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #888;
      line-height: 2;
      text-align: center;
      margin-bottom: 30px;
    }

    .stats em {
      color: #f0f;
      font-style: normal;
    }

    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      z-index: 50;
      pointer-events: all;
    }

    .touch-btn {
      position: absolute;
      width: 70px; height: 70px;
      border: 2px solid rgba(0,255,255,0.3);
      border-radius: 50%;
      background: rgba(0,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: rgba(0,255,255,0.5);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .touch-btn:active {
      background: rgba(0,255,255,0.2);
      border-color: rgba(0,255,255,0.6);
    }

    #btn-left { bottom: 20px; left: 20px; }
    #btn-right { bottom: 20px; left: 110px; }
    #btn-thrust { bottom: 100px; left: 65px; }
    #btn-fire { bottom: 50px; right: 30px; width: 90px; height: 90px; font-size: 14px; font-family: 'Orbitron'; letter-spacing: 2px; border-color: rgba(255,0,255,0.4); color: rgba(255,0,255,0.6); }
    #btn-fire:active { background: rgba(255,0,255,0.2); border-color: rgba(255,0,255,0.6); }

    @media (hover: none) and (pointer: coarse) {
      #mobile-controls { display: block; }
      .controls-hint { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div>
      <div id="score-display">0</div>
      <div id="combo-display">2x COMBO</div>
    </div>
    <div>
      <div id="wave-display">WAVE 1</div>
      <div id="lives-display"></div>
    </div>
  </div>

  <div id="powerup-bar"></div>

  <div id="start-screen">
    <div class="title">ASTEROIDS</div>
    <div class="subtitle">NEON VOID</div>
    <button class="start-btn" id="start-btn">LAUNCH</button>
    <div class="controls-hint">
      <span>W</span> or <span>&uarr;</span> THRUST &nbsp;
      <span>A</span><span>D</span> or <span>&larr;</span><span>&rarr;</span> ROTATE<br>
      <span>SPACE</span> FIRE &nbsp;
      <span>SHIFT</span> DASH
    </div>
  </div>

  <div id="game-over-screen">
    <div class="title" style="font-size:42px">VOID COLLAPSE</div>
    <div class="final-score" id="final-score">0</div>
    <div class="stats" id="final-stats"></div>
    <button class="start-btn" id="restart-btn">RELAUNCH</button>
  </div>

  <div id="mobile-controls">
    <div class="touch-btn" id="btn-left">&#9664;</div>
    <div class="touch-btn" id="btn-right">&#9654;</div>
    <div class="touch-btn" id="btn-thrust">&#9650;</div>
    <div class="touch-btn" id="btn-fire">FIRE</div>
  </div>

  <script src="game.js"></script>
</body>
</html>
